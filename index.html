<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>may i get your number? 🤍</title>
<style>
  :root{
    --cream:#FBF4EC;
    --cream-deep:#F3E7D8;
    --pink:#F3B6C2;
    --pink-deep:#E892A3;
    --brown:#8B6A57;
    --brown-soft:#A98770;
    --ink:#5B4636;
    --white:#FFFDFB;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0; padding:0; height:100%;
    background:var(--cream);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    color:var(--ink);
    overflow:hidden;
  }

  #app{
    position:relative;
    width:100%;
    height:100vh;
    max-width:480px;
    margin:0 auto;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 15%, var(--cream-deep) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, var(--pink) 0%, transparent 35%),
      var(--cream);
  }

  /* ---------- sparkles ---------- */
  .sparkle{
    position:absolute;
    pointer-events:none;
    font-size:18px;
    opacity:.55;
    animation: float 6s ease-in-out infinite;
    user-select:none;
  }
  @keyframes float{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-22px) rotate(15deg); }
  }

  /* ---------- pages ---------- */
  .page{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 24px;
    transition: opacity .55s ease, transform .55s ease;
  }
  .page.hidden{
    opacity:0;
    transform: scale(.92);
    pointer-events:none;
  }

  /* ---------- page one ---------- */
  #lineOne, #lineTwo{
    font-size:1.05rem;
    text-align:center;
    color:var(--brown);
    min-height:1.6em;
    font-weight:500;
  }
  #lineTwo{
    font-size:1.55rem;
    font-weight:700;
    color:var(--ink);
    margin-top:14px;
    min-height:2.4em;
  }
  .typecursor{
    display:inline-block;
    width:2px;
    background:var(--brown-soft);
    margin-left:2px;
    animation: blink 0.9s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .btn-row{
    position:relative;
    width:100%;
    max-width:320px;
    height:140px;
    margin-top:34px;
  }

  .btn{
    border:none;
    border-radius:999px;
    font-size:1.05rem;
    font-weight:700;
    padding:14px 30px;
    cursor:pointer;
    box-shadow:0 6px 0 rgba(139,106,87,.18);
    font-family:inherit;
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .btn:active{ transform: translateY(3px); box-shadow:0 2px 0 rgba(139,106,87,.18); }

  .btn-yes{
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color:#fff;
    position:absolute;
    left:50%;
    top:14px;
    transform: translateX(-50%);
  }
  .btn-yes:hover{ transform: translateX(-50%) scale(1.05); }

  .btn-no{
    background: var(--white);
    color: var(--brown);
    border:2px solid var(--cream-deep);
    position:absolute;
    left:50%;
    top:84px;
    transform: translateX(-50%);
    box-shadow:0 4px 0 rgba(139,106,87,.12);
  }

  .shake{
    animation: shake .4s ease;
  }
  @keyframes shake{
    0%,100%{ transform: translate(-50%,0) rotate(0deg); }
    20%{ transform: translate(-50%,0) rotate(-8deg) scale(.95); }
    40%{ transform: translate(-50%,0) rotate(8deg) scale(.95); }
    60%{ transform: translate(-50%,0) rotate(-6deg) scale(1.02); }
    80%{ transform: translate(-50%,0) rotate(6deg) scale(1.02); }
  }

  /* ---------- page two : contact card ---------- */
  .card{
    background:var(--white);
    border-radius:28px;
    width:100%;
    max-width:320px;
    padding:28px 24px 30px;
    box-shadow: 0 14px 34px rgba(139,106,87,.16);
    text-align:center;
    position:relative;
  }
  .card-title{
    font-size:1.2rem;
    font-weight:800;
    color:var(--pink-deep);
    margin:0 0 18px;
  }
  .avatar{
    width:74px; height:74px;
    border-radius:50%;
    margin:0 auto 14px;
    background: linear-gradient(135deg, var(--pink), var(--cream-deep));
    display:flex; align-items:center; justify-content:center;
    font-size:30px;
    box-shadow: inset 0 0 0 4px var(--white), 0 4px 10px rgba(139,106,87,.2);
  }
  .name{
    font-size:1.3rem;
    font-weight:800;
    color:var(--ink);
    margin:0;
  }
  .status{
    font-size:.85rem;
    color:var(--brown-soft);
    font-style:italic;
    margin:4px 0 20px;
  }

  .num-input{
    width:100%;
    padding:14px 18px;
    border-radius:999px;
    border:2px solid var(--cream-deep);
    background:var(--cream);
    font-size:1rem;
    color:var(--ink);
    outline:none;
    text-align:center;
    font-family:inherit;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .num-input:focus{
    border-color: var(--pink-deep);
    box-shadow: 0 0 0 4px rgba(232,146,163,.18);
  }

  .submit-btn{
    margin-top:14px;
    width:100%;
    border:none;
    border-radius:999px;
    padding:14px;
    font-size:1rem;
    font-weight:700;
    color:#fff;
    background:linear-gradient(135deg, var(--pink), var(--pink-deep));
    cursor:pointer;
    box-shadow:0 6px 0 rgba(139,106,87,.18);
    font-family:inherit;
    transition: transform .15s ease;
  }
  .submit-btn:active{ transform: translateY(3px); box-shadow:0 2px 0 rgba(139,106,87,.18); }
  .submit-btn:disabled{ opacity:.6; cursor:default; }

  .err-msg{
    color:#C9667A;
    font-size:.8rem;
    margin-top:8px;
    min-height:1em;
  }

  /* thank you state */
  .thanks{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .thanks.show{ display:flex; }
  .thanks p{
    font-size:1.05rem;
    font-weight:700;
    color:var(--brown);
    text-align:center;
    margin:0;
  }
  .heart-pop{
    font-size:2.2rem;
    animation: pop 1s ease;
  }
  @keyframes pop{
    0%{ transform: scale(0); }
    60%{ transform: scale(1.3); }
    100%{ transform: scale(1); }
  }

  .form-wrap.hide{ display:none; }

  /* confetti */
  .confetti{
    position:absolute;
    top:-10px;
    font-size:14px;
    pointer-events:none;
    animation: drop linear forwards;
  }
  @keyframes drop{
    to{ transform: translateY(110vh) rotate(360deg); opacity:.2; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
  }
</style>
</head>
<body>

<div id="app">

  <!-- PAGE 1 -->
  <div class="page" id="page1">
    <div id="lineOne"></div>
    <div id="lineTwo"></div>

    <div class="btn-row" id="btnRow" style="opacity:0;">
      <button class="btn btn-yes" id="yesBtn">yes 💗</button>
      <button class="btn btn-no" id="noBtn">no</button>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page hidden" id="page2">
    <div class="card">
      <div class="card-title">new contact unlocked ✨</div>
      <div class="avatar">🌸</div>
      <p class="name">Kirana</p>
      <p class="status">someone i wanted to know more</p>

      <div class="form-wrap" id="formWrap">
        <form id="numberForm" autocomplete="off">
          <input
            class="num-input"
            id="numberInput"
            type="tel"
            inputmode="numeric"
            placeholder="your number here..."
            maxlength="20"
            required
          />
          <button class="submit-btn" id="submitBtn" type="submit">send it 🤍</button>
          <div class="err-msg" id="errMsg"></div>
        </form>
      </div>

      <div class="thanks" id="thanksBox">
        <div class="heart-pop">🤍</div>
        <p>thank you, princess,<br>for letting me have your number 🤍</p>
      </div>
    </div>
  </div>

</div>

<script>
/* ---------------- sparkles background ---------------- */
const app = document.getElementById('app');
const sparkleChars = ['✨','💗','🤍','⋆','✦','🌸'];
for(let i=0;i<14;i++){
  const s = document.createElement('div');
  s.className='sparkle';
  s.textContent = sparkleChars[Math.floor(Math.random()*sparkleChars.length)];
  s.style.left = Math.random()*92+'%';
  s.style.top = Math.random()*92+'%';
  s.style.animationDelay = (Math.random()*5)+'s';
  s.style.animationDuration = (4+Math.random()*4)+'s';
  s.style.fontSize = (12+Math.random()*14)+'px';
  app.appendChild(s);
}

/* ---------------- typing animation ---------------- */
function typeLine(el, text, speed, cb){
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'typecursor';
  cursor.textContent = '\u00A0';
  let i = 0;
  el.appendChild(cursor);
  function step(){
    if(i < text.length){
      cursor.insertAdjacentText('beforebegin', text[i]);
      i++;
      setTimeout(step, speed);
    } else {
      cursor.remove();
      if(cb) cb();
    }
  }
  step();
}

const lineOne = document.getElementById('lineOne');
const lineTwo = document.getElementById('lineTwo');
const btnRow = document.getElementById('btnRow');

typeLine(lineOne, "hmm... i have a question for you 👀", 45, ()=>{
  setTimeout(()=>{
    typeLine(lineTwo, "may i get your number?", 55, ()=>{
      btnRow.style.transition = 'opacity .5s ease';
      btnRow.style.opacity = '1';
    });
  }, 500);
});

/* ---------------- escaping "no" button ---------------- */
const noBtn = document.getElementById('noBtn');
const btnRowEl = document.getElementById('btnRow');

function escapeNoBtn(){
  const rowRect = btnRowEl.getBoundingClientRect();
  const btnW = noBtn.offsetWidth;
  const btnH = noBtn.offsetHeight;

  const maxX = rowRect.width - btnW;
  const maxY = rowRect.height - btnH;

  const randX = Math.random()*Math.max(maxX,0);
  const randY = Math.random()*Math.max(maxY,0);

  noBtn.style.left = randX + (btnW/2) + 'px';
  noBtn.style.top = randY + (btnH/2) + 'px';
  noBtn.style.transform = 'translate(-50%,-50%)';

  noBtn.classList.remove('shake');
  // restart animation
  void noBtn.offsetWidth;
  noBtn.classList.add('shake');
}

['pointerdown','mouseover','touchstart'].forEach(evt=>{
  noBtn.addEventListener(evt, (e)=>{
    e.preventDefault();
    escapeNoBtn();
  }, {passive:false});
});

/* ---------------- yes button -> transition + confetti ---------------- */
const yesBtn = document.getElementById('yesBtn');
const page1 = document.getElementById('page1');
const page2 = document.getElementById('page2');

function burstConfetti(){
  const chars = ['🎉','✨','💗','🤍','⋆'];
  for(let i=0;i<20;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.textContent = chars[Math.floor(Math.random()*chars.length)];
    c.style.left = Math.random()*100+'%';
    c.style.animationDuration = (1.4+Math.random()*1.2)+'s';
    c.style.animationDelay = (Math.random()*0.4)+'s';
    app.appendChild(c);
    setTimeout(()=>c.remove(), 3000);
  }
}

yesBtn.addEventListener('click', ()=>{
  burstConfetti();
  page1.classList.add('hidden');
  setTimeout(()=>{
    page2.classList.remove('hidden');
  }, 250);
});

/* ---------------- contact form submit ---------------- */
const numberForm = document.getElementById('numberForm');
const numberInput = document.getElementById('numberInput');
const submitBtn = document.getElementById('submitBtn');
const errMsg = document.getElementById('errMsg');
const formWrap = document.getElementById('formWrap');
const thanksBox = document.getElementById('thanksBox');

numberForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const value = numberInput.value.trim();

  if(value.length < 6){
    errMsg.textContent = 'hmm, that looks a little short 👀';
    return;
  }
  errMsg.textContent = '';
  submitBtn.disabled = true;
  submitBtn.textContent = 'sending...';

  try{
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ number: value })
    });

    if(!res.ok) throw new Error('failed');

    formWrap.classList.add('hide');
    thanksBox.classList.add('show');
    burstConfetti();
  }catch(err){
    submitBtn.disabled = false;
    submitBtn.textContent = 'send it 🤍';
    errMsg.textContent = "oops, that didn't go through — try again?";
  }
});
</script>

</body>
</html>
